<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isabella Andrade</title>
  <meta name="description" content="Isabella Andrade — Harvard CS & Economics student and student founder. Three portfolio editions, one red fish: spin the wheel for today's edition.">
  <meta name="theme-color" content="#f6f3ea">
  <meta property="og:title" content="Isabella Andrade">
  <meta property="og:description" content="Three portfolios, one fish — spin for today's edition.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ilandrade.github.io/">
  <link rel="canonical" href="https://ilandrade.github.io/">

  <!-- Favicon: the red fish -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%90%9F%3C/text%3E%3C/svg%3E" type="image/svg+xml">

  <!-- Fonts: Fragment Mono (voice of the door) + each edition's display face for its own segment -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Fraunces:opsz,wght@9..144,600&family=Instrument+Serif&family=Gloock&display=swap" rel="stylesheet">

  <style>
    :root {
      --ground: #f6f3ea;
      --ink: #16365c;
      --red: #d2402f;
      --cobalt: #1d59a8;
      --cream: #fdf6e9;
      --pine: #2E5941;
      --paper: #F5F4EF;
      --steel: #2c4a6e;
      --silver: #e9ecea;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--ground);
      color: var(--ink);
      font-family: 'Fragment Mono', monospace;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* hairline frame — the door has a doorframe */
    .frame {
      position: fixed;
      inset: 14px;
      border: 1px solid rgba(22, 54, 92, .28);
      pointer-events: none;
      z-index: 5;
    }

    .door {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 20px 34px;
      text-align: center;
    }

    .brand {
      font-size: 13px;
      letter-spacing: .42em;
      text-indent: .42em; /* balance tracking on centered text */
      text-transform: uppercase;
      color: var(--ink);
    }

    .brand .dot { color: var(--red); }

    .eyebrow {
      margin-top: 14px;
      font-size: 12px;
      font-style: italic;
      color: rgba(22, 54, 92, .62);
    }

    /* ---- the wheel ---- */
    .stage {
      position: relative;
      margin-top: 40px;
      width: min(85vw, 420px);
    }

    .pointer {
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      z-index: 3;
      filter: drop-shadow(0 3px 4px rgba(22, 54, 92, .25));
    }

    .pointer svg { display: block; width: 100%; }

    .wheelbox {
      width: 100%;
      will-change: transform;
    }

    .wheelbox svg { display: block; width: 100%; height: auto; }

    body.armed .stage { cursor: pointer; }

    .stage:focus-visible {
      outline: 2px dashed var(--red);
      outline-offset: 10px;
      border-radius: 50%;
    }

    /* winner beat */
    .seg { transition: opacity .45s ease; }
    .settled .seg:not(.win) { opacity: .3; }
    .settled .seg.win { animation: winpulse .3s ease-in-out 2; }

    @keyframes winpulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.14) saturate(1.2); }
    }

    /* fish behaviours */
    .pointer.bob svg { animation: bob 2.6s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }

    .pointer svg.tick { animation: nudge .14s ease-out 1; }
    @keyframes nudge {
      0% { transform: rotate(0) translateY(0); }
      40% { transform: rotate(9deg) translateY(2px); }
      100% { transform: rotate(0) translateY(0); }
    }

    .pointer svg.cheer { animation: cheer .55s ease-in-out 1; }
    @keyframes cheer {
      0%, 100% { transform: rotate(0); }
      20% { transform: rotate(-14deg); }
      45% { transform: rotate(12deg); }
      70% { transform: rotate(-8deg); }
    }

    /* ---- copy + controls ---- */
    .copy {
      margin-top: 34px;
      font-size: 13.5px;
      color: var(--ink);
      min-height: 1.4em;
    }

    .copy.result { color: var(--red); }

    .spinbtn {
      margin-top: 18px;
      font-family: 'Fragment Mono', monospace;
      font-size: 13px;
      letter-spacing: .32em;
      text-indent: .32em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      border-radius: 999px;
      padding: 12px 38px;
      cursor: pointer;
      transition: color .2s ease, border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .spinbtn:hover:not(:disabled),
    .spinbtn:focus-visible {
      color: var(--ground);
      background: var(--red);
      border-color: var(--red);
      transform: translateY(-1px);
    }

    .spinbtn:focus-visible { outline: 2px dashed var(--red); outline-offset: 4px; }

    .spinbtn:disabled {
      cursor: default;
      color: rgba(22, 54, 92, .45);
      border-color: rgba(22, 54, 92, .3);
      background: transparent;
      transform: none;
    }

    .alt {
      margin-top: 30px;
      font-size: 12px;
      color: rgba(22, 54, 92, .62);
    }

    .alt a {
      color: var(--ink);
      text-decoration: none;
      background-image: linear-gradient(currentColor, currentColor);
      background-repeat: no-repeat;
      background-size: 0% 1px;
      background-position: 0 100%;
      padding-bottom: 2px;
      transition: background-size .28s ease;
    }

    .alt a:hover, .alt a:focus-visible { background-size: 100% 1px; }
    .alt a:focus-visible { outline: 1px dashed currentColor; outline-offset: 3px; }
    .alt a.med { color: var(--cobalt); }
    .alt a.cas { color: var(--pine); }
    .alt a.rng { color: var(--red); }

    .sr {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      white-space: nowrap;
    }

    /* load-in */
    .rise { opacity: 0; transform: translateY(14px); animation: rise .7s ease-out forwards; }
    .rise.r2 { animation-delay: .12s; }
    .rise.r3 { animation-delay: .26s; }
    .rise.r4 { animation-delay: .4s; }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      .rise { animation: none; opacity: 1; transform: none; }
      .pointer.bob svg, .pointer svg.tick, .pointer svg.cheer, .settled .seg.win { animation: none; }
      .spinbtn, .alt a, .seg { transition: none; }
    }

    @media (max-height: 700px) {
      .stage { margin-top: 30px; width: min(80vw, 340px); }
      .copy { margin-top: 26px; }
    }
  </style>
</head>

<body>
  <div class="frame" aria-hidden="true"></div>

  <main class="door">
    <h1 class="brand rise">Isabella Andrade<span class="dot">.</span></h1>
    <p class="eyebrow rise r2" id="eyebrow">( choose your edition )</p>

    <div class="stage rise r3" id="stage" aria-label="Portfolio wheel">
      <div class="pointer" id="pointer" aria-hidden="true">
        <!-- the one red fish, nose down -->
        <svg viewBox="0 0 60 100" id="fish">
          <g fill="#d2402f">
            <path d="M30 22 C22 12 14 5 8 2 C16 8 24 10 28 9 L30 16 L32 9 C36 10 44 8 52 2 C46 5 38 12 30 22 Z"/>
            <path d="M30 97 C16 72 17 38 30 14 C43 38 44 72 30 97 Z"/>
            <path d="M19 46 C14 52 12 60 13 66 C17 61 19 54 19 46 Z"/>
            <path d="M41 46 C46 52 48 60 47 66 C43 61 41 54 41 46 Z"/>
          </g>
          <circle cx="25.5" cy="78" r="2.4" fill="#fdf6e9"/>
        </svg>
      </div>

      <div class="wheelbox" id="wheelbox">
        <svg viewBox="-220 -220 440 440" id="wheel" role="img" aria-label="A wheel with three segments: Mediterranean, Cascade, and Ring — the three editions of this portfolio.">
          <defs>
            <!-- Mediterranean: cobalt awning stripes on cream -->
            <pattern id="p-med" patternUnits="userSpaceOnUse" width="30" height="30" patternTransform="rotate(-30)">
              <rect width="30" height="30" fill="#fdf6e9"/>
              <rect width="13" height="30" fill="#1d59a8"/>
            </pattern>
            <!-- Cascade: pine editorial rules on warm paper -->
            <pattern id="p-cas" patternUnits="userSpaceOnUse" width="20" height="15">
              <rect width="20" height="15" fill="#F5F4EF"/>
              <rect y="13.5" width="20" height="1" fill="#2E5941" opacity=".28"/>
            </pattern>
            <!-- a little steel sardine for the Ring segment -->
            <g id="srd">
              <path d="M0 0 C7 -4.5 16 -4.5 22 0 C16 4.5 7 4.5 0 0 Z" fill="#2c4a6e"/>
              <path d="M22 0 L29 -4.5 L26.5 0 L29 4.5 Z" fill="#2c4a6e"/>
              <circle cx="5" cy="-0.8" r="1" fill="#e9ecea"/>
            </g>
            <clipPath id="c0"><path d="M0 0 L0 -193 A193 193 0 0 1 167.1 96.5 Z"/></clipPath>
            <clipPath id="c1"><path d="M0 0 L167.1 96.5 A193 193 0 0 1 -167.1 96.5 Z"/></clipPath>
            <clipPath id="c2"><path d="M0 0 L-167.1 96.5 A193 193 0 0 1 0 -193 Z"/></clipPath>
          </defs>

          <!-- rim -->
          <circle r="204" fill="none" stroke="#16365c" stroke-width="2"/>
          <circle r="197" fill="#f6f3ea" stroke="none"/>

          <!-- segment 0 · MEDITERRANEAN · top-right -->
          <g class="seg" id="seg0">
            <path d="M0 0 L0 -193 A193 193 0 0 1 167.1 96.5 Z" fill="url(#p-med)" stroke="#16365c" stroke-width="2" stroke-linejoin="round"/>
            <g clip-path="url(#c0)">
              <g transform="rotate(-30) translate(112 0)">
                <rect x="-72" y="-16" width="144" height="32" rx="16" fill="#fffdf6" stroke="#1d59a8" stroke-width="1.4"/>
                <text x="0" y="5.5" text-anchor="middle" font-family="Fraunces, serif" font-weight="600" font-size="16.5" letter-spacing="1" fill="#1d59a8">Mediterranean</text>
              </g>
            </g>
          </g>

          <!-- segment 1 · CASCADE · bottom -->
          <g class="seg" id="seg1">
            <path d="M0 0 L167.1 96.5 A193 193 0 0 1 -167.1 96.5 Z" fill="url(#p-cas)" stroke="#16365c" stroke-width="2" stroke-linejoin="round"/>
            <g clip-path="url(#c1)">
              <g transform="translate(0 118)">
                <rect x="-72" y="-16" width="144" height="32" rx="2" fill="#F5F4EF" stroke="#2E5941" stroke-width="1.2"/>
                <line x1="-58" y1="-10" x2="58" y2="-10" stroke="#2E5941" stroke-width="1" opacity=".5"/>
                <line x1="-58" y1="11.5" x2="58" y2="11.5" stroke="#2E5941" stroke-width="1" opacity=".5"/>
                <text x="0" y="6.5" text-anchor="middle" font-family="'Instrument Serif', serif" font-size="19" letter-spacing="1.5" fill="#2E5941">Cascade</text>
              </g>
            </g>
          </g>

          <!-- segment 2 · RING · top-left -->
          <g class="seg" id="seg2">
            <path d="M0 0 L-167.1 96.5 A193 193 0 0 1 0 -193 Z" fill="#e9ecea" stroke="#16365c" stroke-width="2" stroke-linejoin="round"/>
            <g clip-path="url(#c2)">
              <!-- a small school of steel sardines -->
              <use href="#srd" transform="translate(-142 40) rotate(-24)"/>
              <use href="#srd" transform="translate(-150 -22) rotate(-28) scale(.85)"/>
              <use href="#srd" transform="translate(-96 -102) rotate(-38)"/>
              <use href="#srd" transform="translate(-52 -150) rotate(-52) scale(.9)"/>
              <use href="#srd" transform="translate(-58 -66) rotate(-35) scale(.75)"/>
              <use href="#srd" transform="translate(-116 -58) rotate(-30) scale(1.05)"/>
              <use href="#srd" transform="translate(-24 -108) rotate(-55) scale(.7)"/>
              <use href="#srd" transform="translate(-88 6) rotate(-20) scale(.8)"/>
              <g transform="rotate(30) translate(-112 0)">
                <rect x="-58" y="-16" width="116" height="32" rx="16" fill="#fdfdfc" stroke="#2c4a6e" stroke-width="1.2"/>
                <text x="0" y="6" text-anchor="middle" font-family="Gloock, serif" font-size="17" letter-spacing="2" fill="#1c2f42">Ring</text>
              </g>
            </g>
          </g>

          <!-- hub -->
          <circle r="37" fill="#f6f3ea" stroke="#16365c" stroke-width="2"/>
          <circle r="30" fill="#16365c"/>
          <text x="0" y="6" text-anchor="middle" font-family="Fraunces, serif" font-weight="600" font-style="italic" font-size="17" fill="#fdf6e9">IA</text>
        </svg>
      </div>
    </div>

    <p class="copy rise r4" id="copy">three portfolios, one fish — choose your edition</p>
    <button class="spinbtn rise r4" id="spinbtn" type="button" hidden>Spin</button>

    <p class="alt rise r4">or choose your own current:
      <a class="med" href="/mediterranean.html">mediterranean</a> ·
      <a class="cas" href="/cascade.html">cascade</a> ·
      <a class="rng" href="/ring.html">ring</a>
    </p>

    <p class="sr" role="status" aria-live="polite" id="status"></p>
  </main>

  <script>
    (function () {
      'use strict';

      var editions = [
        { name: 'Mediterranean', href: '/mediterranean.html', line: 'today you’re riviera-bound →' },
        { name: 'Cascade',       href: '/cascade.html',       line: 'today you’re deep in the chapters →' },
        { name: 'Ring',          href: '/ring.html',          line: 'today you swim with the school →' }
      ];

      var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduced) return; // static triptych: the direct links are the primary action

      var stage    = document.getElementById('stage');
      var wheelbox = document.getElementById('wheelbox');
      var pointer  = document.getElementById('pointer');
      var fish     = document.getElementById('fish');
      var btn      = document.getElementById('spinbtn');
      var copy     = document.getElementById('copy');
      var eyebrow  = document.getElementById('eyebrow');
      var status   = document.getElementById('status');

      // arm the door
      document.body.classList.add('armed');
      btn.hidden = false;
      eyebrow.textContent = '( spin to enter )';
      copy.textContent = 'three portfolios, one fish — spin for today’s edition';
      pointer.classList.add('bob');
      stage.setAttribute('role', 'button');
      stage.setAttribute('tabindex', '0');
      stage.setAttribute('aria-label', 'Spin the wheel to pick a portfolio edition');

      var spun = false;

      function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

      function spin() {
        if (spun) return;
        spun = true;

        btn.disabled = true;
        btn.setAttribute('aria-disabled', 'true');
        btn.textContent = 'round she goes…';
        stage.setAttribute('aria-disabled', 'true');
        pointer.classList.remove('bob');
        status.textContent = 'Spinning the wheel…';

        // uniform-random winner; land the pointer well inside the segment
        var w = Math.floor(Math.random() * 3);
        var r = 18 + Math.random() * 84;                       // degrees into the segment (margin from edges)
        var revs = 3 + Math.floor(Math.random() * 3);          // 3–5 full revolutions
        var total = 360 * revs + ((360 - (120 * w + r)) % 360);
        var duration = 3400 + Math.random() * 700;

        var start = null;
        var lastTick = 0;

        function frame(ts) {
          if (start === null) start = ts;
          var t = Math.min((ts - start) / duration, 1);
          var th = total * easeOutQuart(t);
          wheelbox.style.transform = 'rotate(' + th + 'deg)';

          // a segment boundary slides past the fish every 120°
          var tickIndex = Math.floor(th / 120);
          if (tickIndex > lastTick) {
            lastTick = tickIndex;
            fish.classList.remove('tick');
            void fish.getBoundingClientRect();
            fish.classList.add('tick');
          }

          if (t < 1) { requestAnimationFrame(frame); }
          else { settle(w, total); }
        }
        requestAnimationFrame(frame);
      }

      function settle(w, total) {
        var ed = editions[w];
        wheelbox.classList.add('settled');
        document.getElementById('seg' + w).classList.add('win');
        fish.classList.remove('tick');
        void fish.getBoundingClientRect();
        fish.classList.add('cheer');
        copy.textContent = ed.line;
        copy.classList.add('result');
        btn.textContent = ed.name.toLowerCase() + ' it is';
        status.textContent = 'The wheel landed on ' + ed.name + '. Taking you there.';
        window.__result = { winner: w, name: ed.name, rotation: total % 360 };
        setTimeout(function () { window.location.href = ed.href; }, 850);
      }

      btn.addEventListener('click', spin);
      stage.addEventListener('click', spin);
      stage.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ' || e.key === 'Spacebar') {
          e.preventDefault();
          spin();
        }
      });
    })();
  </script>
</body>

</html>
